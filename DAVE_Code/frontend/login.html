<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="page-header">
        <div class="main-container">
            <div class="header-top">
                <div class="title-section">
                    <h1 class="main-title">DAVE</h1>
                    <p class="subtitle"><small>Documents and Applications Validation Engine</small></p>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container main-content">
        
        <div class="section">
            <div class="full-width">
                <div class="login-container">

                    <!-- LOGIN -->
                    <div id="login-section">
                        <form class="login-form" id="login-form">
                            <h3 class="form-title">Sign In</h3>

                            <div class="form-group">
                                <label for="email" class="input-label">Email address</label>
                                <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
                            </div>

                            <div class="form-group">
                                <label for="password" class="input-label">Password</label>
                                <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                            </div>

                            <button type="submit" class="primary-button login-button">Login</button>

                            <div id="login-message" class="login-message" style="display:none"></div>

                            <p style="margin-top:1em;font-size:0.9rem;color:#555">
                                No account? <a href="#" onclick="showSection('register');return false;">Register here</a>
                            </p>
                        </form>
                    </div>

                    <!-- REGISTER -->
                    <div id="register-section" style="display:none">
                        <form class="login-form" id="register-form">
                            <h3 class="form-title">Create Account</h3>

                            <div class="form-group">
                                <label for="reg-name" class="input-label">Full Name</label>
                                <input type="text" class="form-input" id="reg-name" placeholder="Your full name" required minlength="2">
                            </div>

                            <div class="form-group">
                                <label for="reg-email" class="input-label">Email address</label>
                                <input type="email" class="form-input" id="reg-email" placeholder="Enter your email" required>
                            </div>

                            <div class="form-group">
                                <label for="reg-password" class="input-label">Password</label>
                                <input type="password" class="form-input" id="reg-password" placeholder="Min 8 chars, uppercase, lowercase, digit" required minlength="8">
                                <small class="help-text">Must contain at least one uppercase letter, lowercase letter, and digit.</small>
                            </div>

                            <button type="submit" class="primary-button login-button">Create Account</button>

                            <div id="register-message" class="login-message" style="display:none"></div>

                            <p style="margin-top:1em;font-size:0.9rem;color:#555">
                                Already have an account? <a href="#" onclick="showSection('login');return false;">Sign in</a>
                            </p>
                        </form>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <footer class="page-footer">
        <div class="main-container">
            <p class="footer-text">
                <small>&copy; 2026 DAVE | RomerOS</small>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js?v=20260427"></script>
    <script src="login.js?v=20260427"></script>
</body>
</html>
