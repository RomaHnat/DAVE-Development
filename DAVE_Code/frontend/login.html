<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE Prototype - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="page-header">
        <div class="main-container">
            <div class="header-top">
                <div class="title-section">
                    <h1 class="main-title">DAVE Prototype</h1>
                    <p class="subtitle"><small>Documents and Applications Validation Engine</small></p>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container main-content">
        
        <div class="section">
            <div class="full-width">
                <div class="login-container">
                    <form class="login-form" id="login-form">
                        <h3 class="form-title">User Login</h3>
                        
                        <div class="form-group">
                            <label for="email" class="input-label">Email address</label>
                            <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password" class="input-label">Password</label>
                            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>    
                        </div>
                        
                        <button type="submit" class="primary-button login-button">Login</button>
                        
                        <div id="login-message" class="login-message" style="display: none;"></div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <footer class="page-footer">
        <div class="main-container">
            <p class="footer-text">
                <small>&copy; 2025 DAVE Prototype | RomerOS </small>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
