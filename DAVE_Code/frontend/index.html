<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="page-header">
        <div class="main-container">
            <div class="header-top">
                <div class="title-section">
                    <h1 class="main-title">DAVE</h1>
                    <p class="subtitle"><small>Documents and Applications Validation Engine</small></p>
                </div>
                <div class="user-info">
                    <a href="profile.html" class="header-text-link" id="header-user-name" title="My Profile"></a>
                    <a href="#" id="notif-toggle" class="header-text-link" title="Notifications">
                        🔔 <span id="notif-badge" class="notif-badge" style="display:none">0</span>
                    </a>
                    <a href="profile.html" class="header-text-link">My Profile</a>
                    <a href="admin.html" id="admin-link" class="header-text-link" style="display:none">Admin Panel</a>
                    <a href="#" id="logout-btn" class="header-text-link">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container main-content">

        <!-- Notifications panel -->
        <div id="notif-panel" class="info-card" style="display:none;max-height:320px;overflow-y:auto;margin-bottom:1.5em">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                <h5 style="margin:0">Notifications</h5>
                <button id="mark-all-btn" class="secondary-button" style="padding:0.25em 0.7em;font-size:0.82rem">Mark all read</button>
            </div>
            <div id="notif-list" class="card-content" style="padding:0"></div>
        </div>

        <!-- Applications table -->
        <div class="section">
            <div class="info-card">
                <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                    <h5 style="margin:0">My Applications</h5>
                    <button id="new-app-btn" class="primary-button">+ New Application</button>
                </div>
                <div class="card-content" style="padding:0">
                    <div id="apps-loading" class="centered" style="padding:2.5em">
                        <span class="spinner-border spinner-border-sm"></span>&nbsp; Loading applications…
                    </div>
                    <div id="apps-empty" style="display:none;padding:2em;text-align:center;color:#666">
                        No applications yet. Click <strong>+ New Application</strong> to start.
                    </div>
                    <table id="apps-table" class="data-table" style="display:none">
                        <thead>
                            <tr>
                                <th>Case ID</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Updated</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="apps-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- New Application Modal -->
    <div id="new-app-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <h5>New Application</h5>
                <button id="modal-close-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="input-label">Application Type</label>
                    <select id="type-select" class="form-input">
                        <option value="">Loading…</option>
                    </select>
                </div>
                <div id="type-desc" class="info-message" style="display:none"></div>
                <div id="modal-msg" class="login-message" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="secondary-button">Cancel</button>
                <button id="modal-create-btn" class="primary-button">Create Application</button>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <p class="footer-text"><small>&copy; 2026 DAVE | RomerOS</small></p>
    </footer>

    <script src="api.js?v=20260427"></script>
    <script src="app.js?v=20260427"></script>
</body>
</html>
