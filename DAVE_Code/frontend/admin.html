<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="page-header">
        <div class="main-container">
            <div class="header-top">
                <div class="title-section">
                    <h1 class="main-title">DAVE - Admin</h1>
                    <p class="subtitle"><small>Documents and Applications Validation Engine</small></p>
                </div>
                <div class="user-info">
                    <a href="index.html" class="header-text-link">Dashboard</a>
                    <a href="profile.html" class="header-text-link">My Profile</a>
                    <a href="#" id="logout-btn" class="header-text-link">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container main-content">

        <div class="tab-bar">
            <button class="tab-btn tab-active" id="tab-apps-btn" onclick="switchTab('apps')">Applications</button>
            <button class="tab-btn" id="tab-users-btn" onclick="switchTab('users')">Users</button>
        </div>

        <div id="tab-apps">
            <div class="section">
                <div class="info-card">
                    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5em">
                        <h5 style="margin:0">All Applications</h5>
                        <div style="display:flex;gap:0.5em;align-items:center">
                            <label class="input-label" style="margin:0">Filter:</label>
                            <select id="status-filter" class="form-input" style="width:auto;padding:0.3em 0.6em">
                                <option value="">All Statuses</option>
                                <option value="draft">Draft</option>
                                <option value="submitted">Submitted</option>
                                <option value="under_review">Under Review</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                            <button class="secondary-button" onclick="loadAdminApps()" style="padding:0.35em 0.8em">Refresh</button>
                        </div>
                    </div>
                    <div class="card-content" style="padding:0">
                        <div id="admin-apps-loading" class="centered" style="padding:2.5em">
                            <span class="spinner-border spinner-border-sm"></span>&nbsp; Loading…
                        </div>
                        <table id="admin-apps-table" class="data-table" style="display:none">
                            <thead>
                                <tr>
                                    <th>Case ID</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Submitted</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="admin-apps-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-users" style="display:none">
            <div class="section">
                <div class="info-card">
                    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                        <h5 style="margin:0">All Users</h5>
                        <button class="secondary-button" onclick="loadAdminUsers()" style="padding:0.35em 0.8em">Refresh</button>
                    </div>
                    <div class="card-content" style="padding:0">
                        <div id="admin-users-loading" class="centered" style="padding:2.5em">
                            <span class="spinner-border spinner-border-sm"></span>&nbsp; Loading…
                        </div>
                        <table id="admin-users-table" class="data-table" style="display:none">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Registered</th>
                                </tr>
                            </thead>
                            <tbody id="admin-users-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="review-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <h5 id="review-modal-title">Review Application</h5>
                <button onclick="closeReviewModal()" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="review-info" style="margin-bottom:1em;color:#555" class="small-text"></div>
                <div class="form-group">
                    <label class="input-label">New Status</label>
                    <select id="review-status" class="form-input">
                        <option value="under_review">Under Review</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="input-label">Admin Notes <span style="color:#999;font-weight:normal">(optional - visible to applicant)</span></label>
                    <textarea id="review-notes" class="text-area" rows="3"
                              placeholder="Reason for decision, missing documents, etc."></textarea>
                </div>
                <div id="review-msg" class="login-message" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button onclick="closeReviewModal()" class="secondary-button">Cancel</button>
                <button onclick="submitReview()" class="primary-button">Update Status</button>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <p class="footer-text"><small>&copy; 2026 DAVE - Admin</small></p>
    </footer>

    <script src="api.js?v=20260427"></script>
    <script src="admin.js?v=20260427"></script>
</body>
</html>
